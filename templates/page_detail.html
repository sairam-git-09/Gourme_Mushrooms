{% extends "base.html" %}

{% block content %}
<section class="w-full px-6 py-24 md:px-12 bg-[#F5F5F0] min-h-screen">
    <div class="max-w-4xl mx-auto bg-white p-8 md:p-16 shadow-sm">
        {% if page.hero_image %}
        <div class="w-full h-64 md:h-96 overflow-hidden mb-8">
            <img src="{{ page.hero_image.url }}" alt="{{ page.title }}" class="w-full h-full object-cover">
        </div>
        {% endif %}
        
        <h1 class="text-4xl md:text-5xl font-serif uppercase tracking-widest leading-tight text-[#2D2D2A] mb-4">{{ page.title }}</h1>
        
        {% if page.sub_headline %}
        <h2 class="text-xl md:text-2xl text-[#8A9A5B] italic mb-8">{{ page.sub_headline }}</h2>
        {% endif %}
        
        <div class="prose prose-lg max-w-none text-[#2D2D2A]/80 leading-relaxed">
            {{ page.body_text|linebreaks }}
        </div>
    </div>
</section>
{% endblock %}
